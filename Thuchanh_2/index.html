<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

.wrapper{
    width:900px;
    margin:40px auto;
    background:#fff;
    border:2px solid #333;
    padding:30px;
}

.heading{
    font-size:22px;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    display:flex;
    gap:20px;
    margin-bottom:18px;
}

.form-group.full{
    flex-direction:column;
}

.form-group input{
    flex:1;
}

input, textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
    width:100%;
    box-sizing:border-box;
}

textarea{
    height:220px;
    resize:none;
}

.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

button{
    background:#79bcd8;
    border:none;
    padding:12px 30px;
    color:#fff;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#5da8c8;
}

.note{
    font-size:14px;
    color:#777;
}
</style>

</head>
<body>

<div class="wrapper">
    <div class="heading">
        Get in touch with us by filling contact form below
    </div>

    <form>
        <div class="form-group">
            <input type="text" placeholder="* Enter your full name" required>
            <input type="email" placeholder="* Enter your email address" required>
        </div>

        <div class="form-group full">
            <input type="text" placeholder="Enter your subject">
        </div>

        <div class="form-group full">
            <textarea placeholder="* Your message here..." required></textarea>
        </div>

        <div class="footer">
            <button type="submit">Send message</button>
            <div class="note">
                * Please fill all required form field, thanks!
            </div>
        </div>
    </form>
</div>

</body>
</html>
