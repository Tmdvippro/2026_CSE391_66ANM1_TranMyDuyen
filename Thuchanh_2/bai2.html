<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Goals</title>

<!-- Google Font giống style ảnh -->
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

<!-- Font Awesome Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Raleway', sans-serif;
}

body{
    background:#4b0f4f;
    padding:40px;
}

/* ===== KHUNG CHÍNH ===== */
.container{
    border:6px solid #ff4fa3;
    background:white;
    overflow:hidden;
}

/* ===== HEADER ===== */
header{
    position:relative;
}

/* NAV */
nav{
    position:absolute;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 60px;
    z-index:2;
}

.logo{
    color:#ffd700;
    font-weight:700;
    font-style:italic;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:700;
    font-size:14px;
}

/* HERO */
.hero{
    height:520px;
    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-box{
    background:rgba(0,0,0,0.75);
    padding:50px 80px;
    text-align:center;
    color:white;
}

.hero-box h1{
    font-size:28px;
    letter-spacing:2px;
    margin-bottom:20px;
}

.hero-box p{
    font-size:14px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    background:#ffd700;
    padding:12px 30px;
    text-decoration:none;
    color:black;
    font-weight:700;
    border-radius:3px;
    transition:0.3s;
}

.btn:hover{
    background:#ffcc00;
}

/* ===== MAIN ===== */
main{
    background:#cde9e6;
    padding:60px 40px;
    text-align:center;
}

main h2{
    font-size:20px;
    letter-spacing:2px;
    margin-bottom:40px;
}

/* 3 ảnh */
.places{
    display:flex;
    justify-content:center;
    gap:40px;
}

.place{
    width:320px;
}

.place img{
    width:100%;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.place p{
    margin-top:15px;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    color:#444;
}

/* ===== FOOTER ===== */
footer{
    background:#111;
    padding:35px 0;
    text-align:center;
}

.social-icon{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:50px;
    height:50px;
    border-radius:50%;
    border:2px solid white;
    color:white;
    font-size:20px;
    margin:0 15px;
    transition:0.3s;
}

.social-icon:hover{
    background:white;
    color:#111;
}
</style>

</head>
<body>

<div class="container">

<header>
    <nav>
        <div class="logo">TRAVEL GOALS</div>
        <ul>
            <li><a href="#">DESTINATIONS</a></li>
            <li><a href="#">ABOUT</a></li>
        </ul>
    </nav>

    <div class="hero">
        <div class="hero-box">
            <h1>JOE'S TRAVEL PAGE</h1>
            <p>LET'S EXPLORE THE WORLD TOGETHER</p>
            <a href="#" class="btn">Discover places</a>
        </div>
    </div>
</header>

<main>
    <section>
        <h2>HIGHLIGHTS</h2>

        <div class="places">
            <div class="place">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
                <p>MIAMI USA</p>
            </div>

            <div class="place">
                <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad">
                <p>MUNICH GERMANY</p>
            </div>

            <div class="place">
                <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
                <p>BARCELONA SPAIN</p>
            </div>
        </div>
    </section>
</main>

<footer>
    <a href="#" class="social-icon">
        <i class="fab fa-instagram"></i>
    </a>

    <a href="#" class="social-icon">
        <i class="fab fa-facebook-f"></i>
    </a>
</footer>

</div>

</body>
</html>
